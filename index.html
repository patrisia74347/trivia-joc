<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Arena Royale</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --primary: #7c3aed; --secondary: #a855f7; --accent: #fbbf24; --bg: #050510; --card-bg: rgba(20, 20, 45, 0.9); }
        body { margin: 0; background: radial-gradient(circle at center, #1a1a35 0%, #050510 100%); color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .container { width: 95%; max-width: 800px; margin-top: 30px; }
        .card { background: var(--card-bg); border: 2px solid #2d2d5a; border-radius: 20px; padding: 30px; backdrop-filter: blur(10px); box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; }
        .btn, .ans-btn, .cat-btn { cursor: pointer; transition: 0.3s; font-weight: bold; border-radius: 8px; }
        .btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; padding: 12px 25px; color: white; width: 100%; max-width: 300px; }
        .ans-btn { display: block; width: 100%; background: #1a1a35; border: 1px solid #2d2d5a; padding: 18px; margin: 10px 0; color: white; text-align: left; font-size: 1.1rem; }
        .ans-btn:hover { background: #2d2d5a; border-color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin: 20px 0; }
        .cat-btn { background: #1a1a35; border: 1px solid #2d2d5a; padding: 15px; color: #9090b8; }
        .cat-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(251, 191, 36, 0.1); }
        #scores { font-size: 1.8rem; color: var(--accent); margin-bottom: 20px; text-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }
        .win { color: #22c55e; } .lose { color: #ef4444; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="letter-spacing: 5px; text-align: center;">TRIVIA <span style="color: var(--accent)">ARENA</span></h1>

    <div id="login-screen" class="card">
        <h2>Intră în Duel</h2>
        <input type="text" id="username" placeholder="Porecla ta..." style="width: 80%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #2d2d5a; background: #1a1a35; color: white;">
        <br><button class="btn" onclick="join()">START</button>
    </div>

    <div id="selection-screen" class="card" style="display:none;">
        <h2 id="turn-info">Se conectează luptătorii...</h2>
        <div class="grid" id="category-list"></div>
    </div>

    <div id="game-screen" style="display:none;">
        <div id="scores"></div>
        <div class="card">
            <div id="q-meta" style="color: var(--secondary); margin-bottom: 10px; font-weight: bold;"></div>
            <h2 id="q-text">Se pregătește întrebarea...</h2>
            <div id="options"></div>
        </div>
    </div>

    <div id="result-screen" class="card" style="display:none;">
        <h1 id="final-status"></h1>
        <div id="final-scores" style="font-size: 1.5rem; margin: 20px 0;"></div>
        <button class="btn" onclick="location.reload()">JOACĂ DIN NOU</button>
    </div>
</div>

<script>
    const socket = io();
    let myId = null;

    function join() {
        const name = document.getElementById('username').value;
        if(name) {
            socket.emit('join_game', name);
            document.getElementById('login-screen').style.display = 'none';
            myId = socket.id;
        }
    }

    socket.on('update_players', (players) => {
        document.getElementById('scores').innerText = players.map(p => `${p.name}: ${p.score}`).join(' VS ');
    });

    socket.on('start_selection', (data) => {
        document.getElementById('selection-screen').style.display = 'block';
        renderCategories(data.categories, [], data.currentPlayerId, data.currentPlayerName);
    });

    socket.on('next_turn', (data) => {
        renderCategories(null, data.picked, data.currentPlayerId, data.currentPlayerName);
    });

    function renderCategories(all, picked, currentId, name) {
        if(all) window.allCats = all;
        const info = document.getElementById('turn-info');
        const list = document.getElementById('category-list');
        info.innerText = (currentId === socket.id) ? "E RÂNDUL TĂU! ALEGE" : `ALEGE ${name.toUpperCase()}...`;
        list.innerHTML = window.allCats.map(cat => {
            const isPicked = picked.includes(cat);
            return `<button class="cat-btn ${isPicked ? 'active' : ''}" ${(isPicked || currentId !== socket.id) ? 'disabled' : ''} onclick="socket.emit('category_picked', '${cat}')">${cat}</button>`;
        }).join('');
    }

    socket.on('selection_complete', () => {
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('game-area').style.display = 'none'; // Prevenim bug-uri
        document.getElementById('game-screen').style.display = 'block';
    });

    socket.on('next_question', (data) => {
        document.getElementById('q-meta').innerText = `RUNDA ${data.number}/${data.total} • ${data.question.cat.toUpperCase()}`;
        document.getElementById('q-text').innerText = data.question.q;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        data.question.a.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'ans-btn';
            b.innerText = opt;
            b.onclick = () => {
                socket.emit('submit_answer', opt);
                optDiv.innerHTML = "<h3 style='color: var(--accent)'>Răspuns trimis! Așteptăm adversarul...</h3>";
            };
            optDiv.appendChild(b);
        });
    });

    socket.on('game_over', (data) => {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        const h1 = document.getElementById('final-status');
        if (data.winnerId === "draw") h1.innerText = "EGALITATE! 🤝";
        else if (data.winnerId === socket.id) { h1.innerText = "AI CÂȘTIGAT! 🏆"; h1.className = "win"; }
        else { h1.innerText = "AI PIERDUT! 💀"; h1.className = "lose"; }
        document.getElementById('final-scores').innerHTML = data.players.map(p => `<div>${p.name}: ${p.score} pct</div>`).join('');
    });
</script>
</body>
</html>
